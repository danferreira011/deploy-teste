name: Repository Dispatch
on:
    repository_dispatch:
        types:
            - deploy-remoto

jobs:
    deploy-to-k8s:
        runs-on: ubuntu-latest  
        steps:

            - name: Deploy no ambiente
              run: echo "Executando o deploy no ambiente de ${{ github.event.client_payload.ambiente }}"

            - name: Curl Deploy no ambiente
              run: "curl -X POST https://webhook.site/94273afc-c964-4465-a01f-564881199502 -d '{ambiente:${{github.event.client_payload.ambiente}}}'"
